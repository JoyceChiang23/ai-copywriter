<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄鐘待辦工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #94a3b8;
        }

        /* 番茄鐘區域 */
        .pomodoro-section {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.5), rgba(30, 58, 138, 0.3));
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 16px;
            padding: 30px 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .timer-display {
            font-size: 56px;
            font-weight: 300;
            color: #f1f5f9;
            font-variant-numeric: tabular-nums;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .timer-controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(148, 163, 184, 0.1);
            color: #cbd5e1;
            border: 1px solid rgba(148, 163, 184, 0.2);
            padding: 10px 16px;
        }

        .btn-secondary:hover {
            background: rgba(148, 163, 184, 0.15);
        }

        .timer-status {
            font-size: 13px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 待辦清單區域 */
        .todo-section {
            margin-top: 30px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 3px;
            height: 16px;
            background: linear-gradient(180deg, #3b82f6, #2563eb);
            border-radius: 2px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            background: rgba(148, 163, 184, 0.08);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="text"]::placeholder {
            color: #64748b;
        }

        input[type="text"]:focus {
            outline: none;
            background: rgba(148, 163, 184, 0.12);
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-add {
            padding: 12px 24px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }

        .todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(148, 163, 184, 0.06);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .todo-item:hover {
            background: rgba(148, 163, 184, 0.1);
            border-color: rgba(148, 163, 184, 0.2);
        }

        .checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #3b82f6;
        }

        .todo-text {
            flex: 1;
            color: #cbd5e1;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .todo-item input[type="checkbox"]:checked + .todo-text {
            color: #64748b;
            text-decoration: line-through;
        }

        .btn-delete {
            width: 28px;
            height: 28px;
            padding: 0;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 6px;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: #64748b;
            font-size: 14px;
        }

        .empty-state-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .title {
                font-size: 24px;
            }

            .timer-display {
                font-size: 44px;
            }

            .timer-controls {
                flex-wrap: wrap;
            }

            .btn-primary, .btn-add {
                padding: 10px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">🍅 番茄鐘</div>
            <div class="subtitle">專注工作・高效完成</div>
        </div>

        <!-- 番茄鐘計時器 -->
        <div class="pomodoro-section">
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div class="timer-controls">
                <button class="btn-primary" id="startBtn" onclick="startTimer()">開始</button>
                <button class="btn-primary" id="pauseBtn" onclick="pauseTimer()" style="display:none;">暫停</button>
                <button class="btn-secondary" onclick="resetTimer()">重置</button>
            </div>
            <div class="timer-status" id="timerStatus">準備開始 • 25 分鐘</div>
        </div>

        <!-- 待辦清單 -->
        <div class="todo-section">
            <div class="section-title">待辦事項</div>
            
            <div class="input-group">
                <input 
                    type="text" 
                    id="todoInput" 
                    placeholder="新增任務..."
                    onkeypress="if(event.key==='Enter') addTodo()"
                >
                <button class="btn-add" onclick="addTodo()">新增</button>
            </div>

            <ul class="todo-list" id="todoList">
                <div class="empty-state">
                    <div class="empty-state-icon">📝</div>
                    <div>還沒有任務，開始規劃你的一天吧！</div>
                </div>
            </ul>
        </div>
    </div>

    <script>
        let timeLeft = 25 * 60; // 25分鐘（秒）
        let isRunning = false;
        let timerInterval = null;

        // 更新計時器顯示
        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timerDisplay').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        // 開始計時
        function startTimer() {
            if (isRunning) return;
            isRunning = true;

            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'flex';
            document.getElementById('timerStatus').textContent = '⏱ 計時中...';

            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateTimerDisplay();
                } else {
                    completeTimer();
                }
            }, 1000);
        }

        // 暫停計時
        function pauseTimer() {
            isRunning = false;
            clearInterval(timerInterval);

            document.getElementById('startBtn').style.display = 'flex';
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('timerStatus').textContent = '⏸ 已暫停';
        }

        // 重置計時
        function resetTimer() {
            isRunning = false;
            clearInterval(timerInterval);
            timeLeft = 25 * 60;

            document.getElementById('startBtn').style.display = 'flex';
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('timerStatus').textContent = '準備開始 • 25 分鐘';
            updateTimerDisplay();
        }

        // 計時完成
        function completeTimer() {
            isRunning = false;
            clearInterval(timerInterval);

            document.getElementById('startBtn').style.display = 'flex';
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('timerStatus').textContent = '✅ 一個番茄鐘完成！';

            // 提示聲音（使用系統聲音）
            const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAAB9AAACABAAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj==');
            audio.play().catch(() => {});

            alert('🎉 一個番茄鐘完成了！休息一下吧。');
            resetTimer();
        }

        // 新增待辦事項
        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();

            if (!text) {
                alert('請輸入任務內容');
                return;
            }

            const todoList = document.getElementById('todoList');

            // 清空空白狀態
            if (todoList.querySelector('.empty-state')) {
                todoList.innerHTML = '';
            }

            const li = document.createElement('li');
            li.className = 'todo-item';
            li.innerHTML = `
                <input type="checkbox" class="checkbox" onchange="toggleTodo(this)">
                <span class="todo-text">${escapeHtml(text)}</span>
                <button class="btn-delete" onclick="deleteTodo(this)">×</button>
            `;

            todoList.appendChild(li);
            input.value = '';
            input.focus();
        }

        // 刪除待辦事項
        function deleteTodo(btn) {
            btn.parentElement.remove();

            if (document.getElementById('todoList').children.length === 0) {
                document.getElementById('todoList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <div>還沒有任務，開始規劃你的一天吧！</div>
                    </div>
                `;
            }
        }

        // 切換待辦狀態
        function toggleTodo(checkbox) {
            // 已在 CSS 中處理樣式
        }

        // 防止 XSS 攻擊
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // 頁面載入時初始化
        window.addEventListener('load', () => {
            updateTimerDisplay();
            document.getElementById('todoInput').focus();
        });
    </script>
</body>
</html>
